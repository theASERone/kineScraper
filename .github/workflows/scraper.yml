name: Ejecutar scraper Kinepolis

permissions:
  contents: write

on:
  schedule:
   # Lunes a jueves: cada hora (minuto 07 para evitar el pico de :00).
    - cron: "7 * * * 1-4"
    # Viernes a domingo: cada 30 minutos aprox (evitando :00/:30 por jitter).
    - cron: "5,35 * * * 5,6,0"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:

      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Instalar Playwright
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Ejecutar scraper
        run: |
          python kinepolis_agent_v2.py

      - name: Commit y push de datos
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add ocupacion_kinepolis.csv metadata.json
          git commit -m "actualización automática datos" || echo "sin cambios"
          git push
