name: Ejecutar scraper Kinepolis

permissions:
  contents: write

on:
  schedule:
# Sin ejecuciones entre 01:00 y 10:59.
    # Lunes a jueves: cada hora en 00:07 y de 11:07 a 23:07.
    - cron: "7 0,11-23 * * 1-4"
    # Viernes a domingo: cada 30 min en 00:05/00:35 y de 11:05/11:35 a 23:05/23:35.
    - cron: "5,35 0,11-23 * * 5,6,0"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:

      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Instalar Playwright
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Ejecutar scraper
        run: |
          python kinepolis_agent_v2.py

      - name: Commit y push de datos
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add ocupacion_kinepolis.csv metadata.json
          git commit -m "actualización automática datos" || echo "sin cambios"
          git push
